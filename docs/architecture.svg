<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="900" viewBox="0 0 1180 900" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title  { font-size: 30px; font-weight: 700; fill: #0f172a; }
      .sub    { font-size: 15px; fill: #64748b; }
      .zone   { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
      .h      { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .t      { font-size: 13px; fill: #334155; }
      .s      { font-size: 12px; fill: #64748b; }
      .wt     { font-size: 12px; fill: #ffffff; font-weight: 600; }
      .lbl    { font-size: 12px; fill: #475569; font-style: italic; }
    </style>
  </defs>

  <rect width="1180" height="900" fill="#f8fafc"/>

  <!-- Header -->
  <text x="40" y="52" class="title">Cadence — Architecture</text>
  <text x="40" y="78" class="sub">Sync Jira once into a local mirror, then run every tool — and the AI — off that trustworthy copy.</text>

  <!-- ================= EXTERNAL ================= -->
  <!-- Jira -->
  <rect x="40" y="120" width="200" height="70" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="140" y="150" text-anchor="middle" class="h">Jira Cloud</text>
  <text x="140" y="172" text-anchor="middle" class="s">tickets · changelogs · versions</text>

  <!-- AI providers -->
  <rect x="940" y="120" width="200" height="70" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1040" y="146" text-anchor="middle" class="h">AI Provider</text>
  <text x="1040" y="167" text-anchor="middle" class="s">Anthropic Claude</text>
  <text x="1040" y="183" text-anchor="middle" class="s">(OpenAI fallback)</text>

  <text x="590" y="148" text-anchor="middle" class="zone" fill="#94a3b8">External services</text>
  <text x="590" y="172" text-anchor="middle" class="s">touched only by the parts below — never at request time</text>

  <!-- ================= SYNC PIPELINE ZONE ================= -->
  <rect x="40" y="220" width="1100" height="160" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="60" y="247" class="zone" fill="#2563eb">Sync pipeline — the ONLY Jira consumer</text>

  <!-- stages -->
  <g>
    <rect x="60" y="262" width="180" height="92" rx="10" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="150" y="290" text-anchor="middle" class="h">Bronze</text>
    <text x="150" y="312" text-anchor="middle" class="s">raw Jira JSON</text>
    <text x="150" y="330" text-anchor="middle" class="s">_gettickets.sh</text>

    <rect x="290" y="262" width="180" height="92" rx="10" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="380" y="290" text-anchor="middle" class="h">Repair</text>
    <text x="380" y="312" text-anchor="middle" class="s">fix false deletes</text>
    <text x="380" y="330" text-anchor="middle" class="s">_repair.sh</text>

    <rect x="520" y="262" width="180" height="92" rx="10" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="610" y="290" text-anchor="middle" class="h">Silver</text>
    <text x="610" y="312" text-anchor="middle" class="s">normalised JSON</text>
    <text x="610" y="330" text-anchor="middle" class="s">+ full changelog</text>

    <rect x="750" y="262" width="180" height="92" rx="10" fill="#fff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="840" y="290" text-anchor="middle" class="h">Gold</text>
    <text x="840" y="312" text-anchor="middle" class="s">computed metrics</text>
    <text x="840" y="330" text-anchor="middle" class="s">CSV + JSONL</text>

    <!-- Sync Now control -->
    <rect x="980" y="262" width="140" height="92" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="1050" y="296" text-anchor="middle" class="h">Sync Now</text>
    <text x="1050" y="318" text-anchor="middle" class="s">triggers &amp;</text>
    <text x="1050" y="334" text-anchor="middle" class="s">monitors</text>
  </g>

  <!-- pipeline arrows -->
  <line x1="240" y1="308" x2="288" y2="308" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="470" y1="308" x2="518" y2="308" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="308" x2="748" y2="308" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Jira -> Bronze -->
  <path d="M140,190 L140,308 L58,308" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="152" y="234" class="lbl">pull</text>

  <!-- ================= DATA STORE ZONE ================= -->
  <rect x="40" y="410" width="1100" height="120" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="60" y="437" class="zone" fill="#16a34a">Local data store — single reproducible snapshot</text>

  <rect x="520" y="452" width="180" height="62" rx="10" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="610" y="479" text-anchor="middle" class="h">silver/</text>
  <text x="610" y="500" text-anchor="middle" class="s">per-ticket JSON</text>

  <rect x="750" y="452" width="180" height="62" rx="10" fill="#fff" stroke="#86efac" stroke-width="1.5"/>
  <text x="840" y="479" text-anchor="middle" class="h">gold/</text>
  <text x="840" y="500" text-anchor="middle" class="s">metric CSVs · JSONL</text>

  <!-- gold/silver write arrows -->
  <line x1="610" y1="356" x2="610" y2="450" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="840" y1="356" x2="840" y2="450" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ================= BACKEND ZONE ================= -->
  <rect x="40" y="560" width="1100" height="180" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="587" class="zone" fill="#475569">Backend — FastAPI (Python)</text>

  <!-- mirror -->
  <rect x="60" y="602" width="200" height="118" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="160" y="630" text-anchor="middle" class="h">mirror.py</text>
  <text x="160" y="652" text-anchor="middle" class="s">in-memory index</text>
  <text x="160" y="670" text-anchor="middle" class="s">over silver/</text>
  <text x="160" y="688" text-anchor="middle" class="s">replays status</text>
  <text x="160" y="706" text-anchor="middle" class="s">history over time</text>

  <!-- tools -->
  <rect x="290" y="602" width="540" height="118" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="310" y="624" class="t" font-weight="700">8 tools (router.py each, mounted by server.py)</text>
  <g class="t">
    <rect x="310" y="636" width="160" height="30" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <text x="390" y="656" text-anchor="middle" class="t">Ask</text>
    <rect x="486" y="636" width="160" height="30" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <text x="566" y="656" text-anchor="middle" class="t">Release Notes</text>
    <rect x="662" y="636" width="150" height="30" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <text x="737" y="656" text-anchor="middle" class="t">Sprint Summary</text>

    <rect x="310" y="676" width="118" height="30" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <text x="369" y="696" text-anchor="middle" class="t">Flow Metrics</text>
    <rect x="444" y="676" width="118" height="30" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <text x="503" y="696" text-anchor="middle" class="t">Hygiene</text>
    <rect x="578" y="676" width="118" height="30" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <text x="637" y="696" text-anchor="middle" class="t">Epic Planner</text>
    <rect x="712" y="676" width="100" height="30" rx="6" fill="#fff" stroke="#e2e8f0"/>
    <text x="762" y="696" text-anchor="middle" class="t">Prompt B.</text>
  </g>

  <!-- AI layer -->
  <rect x="860" y="602" width="260" height="118" rx="10" fill="#fef3f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="990" y="630" text-anchor="middle" class="h">AI layer · ai.py</text>
  <text x="990" y="652" text-anchor="middle" class="s">ai_anthropic / ai_openai</text>
  <text x="990" y="676" text-anchor="middle" class="s">complete · stream ·</text>
  <text x="990" y="692" text-anchor="middle" class="s">complete_with_tools</text>
  <text x="990" y="710" text-anchor="middle" class="s">(agentic tool-use loop)</text>

  <!-- store -> backend reads -->
  <path d="M560,514 L560,540 L160,540 L160,600" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M660,514 L660,540 L560,540 L560,600" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="555" class="lbl">read-only</text>

  <!-- tools <-> mirror -->
  <line x1="290" y1="661" x2="262" y2="661" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- tools -> AI -->
  <line x1="830" y1="661" x2="858" y2="661" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- AI layer -> provider -->
  <path d="M1040,602 L1040,190" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1052" y="400" class="lbl">API</text>

  <!-- ================= FRONTEND ================= -->
  <rect x="40" y="770" width="1100" height="90" rx="14" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="60" y="797" class="zone" fill="#d97706">Frontend — React 18 + TypeScript + Vite + Tailwind</text>
  <text x="60" y="824" class="t">Single-page app · one view per tool · Chart.js dashboards · talks to the backend over HTTP/JSON</text>
  <text x="60" y="846" class="s">Homepage gates tools behind /api/accessible-tools — only Sync is available until the first sync completes.</text>

  <!-- backend <-> frontend -->
  <line x1="590" y1="740" x2="590" y2="768" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="768" x2="560" y2="742" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="760" class="lbl">HTTP</text>
</svg>
